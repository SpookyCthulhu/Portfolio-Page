name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4   
      - name: setup Node
        uses: actions/setup-node@v4
        with:
            node-version: 20
      - run: npm ci
      - run: npm run build
        env: 
          CI: false

      